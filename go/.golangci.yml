version: "2"
run:
  issues-exit-code: 1
  tests: true
linters:
  default: none
  enable:
    - gomodguard
    - govet
    - ineffassign
    - staticcheck
    - unconvert
    - unused
    - nlreturn
    - bodyclose
    - gocheckcompilerdirectives
    - errname
    - errchkjson
  settings:
    nlreturn:
      block-size: 3
    staticcheck:
      checks:
        - all
        - -ST1003 # struct field ... should be ... (mostly acronyms such as Http -> HTTP)
    gomodguard:
      allowed:
        domains:
          - golang.org
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofumpt
  settings:
    gofumpt:
      module-path: github.com/superfly/client-signals/go
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
